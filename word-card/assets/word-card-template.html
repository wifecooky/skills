<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: {{BG_COLOR}};
    --accent: {{ACCENT_COLOR}};
    --accent-glow: {{ACCENT_GLOW}};
    --muted: {{MUTED_COLOR}};
    --ink: {{TEXT_COLOR}};
    --ink-light: {{TEXT_MUTED}};
    --white: #FFFFFF;
    --serif: 'DM Serif Display', 'KingHwa_OldSong', Georgia, 'Noto Serif SC', serif;
    --sans: 'DM Sans', 'KingHwa_OldSong', -apple-system, 'PingFang SC', system-ui, sans-serif;
    --mono: 'SF Mono', 'Menlo', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; background: var(--bg); }

  .page {
    width: 1080px;
    background: var(--bg);
    position: relative;
  }

  .page > .grain {
    position: absolute;
    inset: 0;
    filter: url(#noise);
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
  }

  .ref-tag {
    font: 400 22px/1 var(--mono);
    color: var(--ink-light);
    letter-spacing: 0.06em;
    padding: 56px 60px 0;
    text-transform: uppercase;
  }

  /* ── Word Title ── */
  .word-title {
    padding: 32px 60px 0;
  }

  .word-title .prefix {
    font: 400 152px/0.88 var(--serif);
    color: var(--accent);
    letter-spacing: -0.04em;
    display: inline;
  }

  .word-title .root {
    font: 400 152px/0.88 var(--serif);
    color: var(--ink);
    letter-spacing: -0.04em;
    display: inline;
  }

  .phonetic-row {
    padding: 20px 60px 0;
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  .phonetic-row .ipa {
    font: 400 34px/1 var(--mono);
    color: var(--ink-light);
  }

  .phonetic-row .zh {
    font: 500 36px/1 var(--sans);
    color: var(--ink);
  }

  .roots-line {
    padding: 28px 60px 0;
    font: 400 30px/1.3 var(--sans);
    color: var(--ink-light);
  }

  .roots-line .op {
    color: var(--muted);
    margin: 0 8px;
  }

  /* ── Anchor Zone ── */
  .anchor-zone {
    padding: 56px 60px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 48px;
    align-items: start;
  }

  .hanzi-char {
    font: 400 280px/0.85 var(--serif);
    color: var(--ink);
    opacity: 0.92;
  }

  #constellation {
    width: 520px;
    height: 400px;
  }

  #constellation svg {
    width: 100%;
    height: 100%;
    font-family: var(--sans);
  }

  /* ── Section Labels ── */
  .section-label {
    font: 500 20px/1 var(--mono);
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 60px 12px;
  }

  /* ── Scene ── */
  .scene {
    padding: 0 60px 32px;
    font: 400 38px/1.6 var(--sans);
    color: var(--ink-light);
    max-width: 52ch;
  }

  .scene strong {
    color: var(--ink);
    font-weight: 700;
  }

  /* ── Example ── */
  .example {
    padding: 0 60px 32px;
  }

  .example .en {
    font: 400 34px/1.5 var(--serif);
    color: var(--ink);
    margin-bottom: 12px;
  }

  .example .en em {
    color: var(--accent);
    font-style: italic;
    font-weight: 600;
  }

  .example .zh-note {
    font: 400 30px/1.5 var(--sans);
    color: var(--ink-light);
  }

  /* ── Epiphany ── */
  .epiphany {
    padding: 48px 60px 56px;
    border-top: 2px solid var(--muted);
  }

  .epiphany .line {
    font: 400 42px/1.5 var(--serif);
    color: var(--ink);
    margin-bottom: 16px;
  }

  .epiphany .line .hi {
    color: var(--accent);
    font-weight: 600;
  }

  /* ── Colophon ── */
  .colophon {
    display: flex;
    align-items: center;
    padding: 28px 60px 36px;
    border-top: 1px solid rgba(45,41,38,0.08);
  }

  .colophon .who {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .colophon .who span {
    font: 400 24px/1 var(--sans);
    color: var(--ink-light);
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: var(--ink);
    color: var(--white);
    padding: 8px 12px;
    border-radius: 2px;
    font: 400 14px/1 var(--mono);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 1000;
  }

  #tooltip.visible {
    opacity: 1;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    html, body { width: 100%; }
    .page { width: 100%; }
    .ref-tag { padding: 36px 24px 0; }
    .word-title { padding: 24px 24px 0; }
    .word-title .prefix,
    .word-title .root { font-size: clamp(60px, 12vw, 152px); }
    .phonetic-row { padding: 16px 24px 0; gap: 12px; }
    .phonetic-row .ipa { font-size: clamp(22px, 4vw, 34px); }
    .phonetic-row .zh { font-size: clamp(24px, 5vw, 36px); }
    .roots-line { padding: 20px 24px 0; font-size: clamp(20px, 4vw, 30px); }
    .anchor-zone {
      grid-template-columns: 1fr;
      gap: 32px;
      padding: 40px 24px;
    }
    .hanzi-char { font-size: clamp(120px, 40vw, 280px); }
    #constellation { width: 100%; max-width: 420px; }
    .section-label { padding: 0 24px 8px; font-size: clamp(14px, 3vw, 20px); }
    .scene { padding: 0 24px 24px; font-size: clamp(24px, 5vw, 38px); }
    .example { padding: 0 24px 24px; }
    .example .en { font-size: clamp(22px, 4.5vw, 34px); }
    .example .zh-note { font-size: clamp(20px, 4vw, 30px); }
    .epiphany { padding: 36px 24px 40px; }
    .epiphany .line { font-size: clamp(26px, 5.5vw, 42px); }
    .colophon { padding: 20px 24px; }
  }

  @media (max-width: 520px) {
    .anchor-zone { padding: 28px 24px; gap: 24px; }
    .hanzi-char { text-align: center; }
    #constellation { margin: 0 auto; height: 320px; }
  }
</style>
</head>
<body>

<!-- Grain texture filter -->
<svg width="0" height="0" style="position:absolute">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</svg>

<div class="page">
  <div class="grain"></div>

  <div class="ref-tag">REF — {{REF_TAG}}</div>

  <div class="word-title">
    {{WORD}}
  </div>

  <div class="phonetic-row">
    <span class="ipa">{{PHONETIC}}</span>
    <span class="zh">{{ZH_MEANING}}</span>
  </div>

  <div class="section-label">词源</div>
  <div class="roots-line">
    {{ETYMOLOGY_LINE}}
  </div>

  <div class="anchor-zone">
    <div class="hanzi-char">{{HANZI}}</div>
    <div id="constellation"></div>
  </div>

  <div class="section-label">画面</div>
  <p class="scene">{{SCENE_HTML}}</p>

  <div class="section-label">例句</div>
  <div class="example">
    <div class="en">{{EXAMPLE_EN}}</div>
    <div class="zh-note">{{EXAMPLE_ZH}}</div>
  </div>

  <div class="section-label">金句</div>
  <div class="epiphany">
    <div class="line">{{EPIPHANY_EN}}</div>
    <div class="line">{{EPIPHANY_ZH}}</div>
  </div>

  {{COLOPHON}}
</div>

<div id="tooltip"></div>

<!-- D3.js: use local file for offline screenshot, fallback to CDN -->
<script src="{{D3_PATH}}"></script>
<script>
(() => {
  const W = 520, H = 400;
  const CX = W / 2, CY = H / 2;
  const ACCENT = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  const MUTED  = getComputedStyle(document.documentElement).getPropertyValue('--muted').trim();
  const INK    = getComputedStyle(document.documentElement).getPropertyValue('--ink').trim();
  const INK_L  = getComputedStyle(document.documentElement).getPropertyValue('--ink-light').trim();

  // ── Data injected by LLM ──
  const constellationData = {{CONSTELLATION_DATA}};
  const wordNodes = constellationData.nodes;
  const links = constellationData.links;

  // ── SVG ──
  const svg = d3.select('#constellation')
    .append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`);

  // Filters
  const defs = svg.append('defs');

  const glowFilter = defs.append('filter').attr('id', 'glow');
  glowFilter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
  const glowMerge = glowFilter.append('feMerge');
  glowMerge.append('feMergeNode').attr('in', 'blur');
  glowMerge.append('feMergeNode').attr('in', 'SourceGraphic');

  const hubGrad = defs.append('radialGradient').attr('id', 'hubGrad');
  hubGrad.append('stop').attr('offset', '0%').attr('stop-color', ACCENT).attr('stop-opacity', 0.3);
  hubGrad.append('stop').attr('offset', '100%').attr('stop-color', ACCENT).attr('stop-opacity', 0);

  // ── Force simulation ──
  // Identify family names for spatial separation
  const families = [...new Set(wordNodes.filter(n => n.type !== 'hub').map(n => n.family))];
  const familyX = {};
  if (families.length === 2) {
    familyX[families[0]] = 105;
    familyX[families[1]] = 415;
  } else {
    const step = W / (families.length + 1);
    families.forEach((f, i) => { familyX[f] = step * (i + 1); });
  }

  const simulation = d3.forceSimulation(wordNodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(155).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-180))
    .force('x', d3.forceX(d => d.type === 'hub' ? CX : (familyX[d.family] || CX)).strength(d => d.type === 'hub' ? 1 : 0.35))
    .force('y', d3.forceY(CY).strength(0.06))
    .force('collide', d3.forceCollide(55))
    .alphaDecay(0.015);

  // Fix hub at center
  const hub = wordNodes.find(n => n.type === 'hub');
  if (hub) { hub.fx = CX; hub.fy = CY; }

  // Initial positions: burst from center
  wordNodes.forEach(n => {
    if (n.type !== 'hub') {
      n.x = CX + (Math.random() - 0.5) * 20;
      n.y = CY + (Math.random() - 0.5) * 20;
    }
  });

  // ── Draw layers ──

  // Links
  const linkG = svg.append('g');
  const linkEls = linkG.selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', MUTED)
    .attr('stroke-width', 1)
    .attr('opacity', 0);

  linkEls.transition().delay(300).duration(800).attr('opacity', 0.35);

  // Flow particles
  const flowG = svg.append('g');

  // Ambient particles
  const ambientData = Array.from({ length: 18 }, () => ({
    cx: Math.random() * W,
    cy: Math.random() * H,
    r: 1 + Math.random() * 1.5,
    baseOpacity: 0.08 + Math.random() * 0.15,
    phase: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 1.5
  }));

  const ambientEls = svg.append('g').selectAll('circle')
    .data(ambientData)
    .join('circle')
    .attr('cx', d => d.cx)
    .attr('cy', d => d.cy)
    .attr('r', d => d.r)
    .attr('fill', MUTED)
    .attr('opacity', d => d.baseOpacity);

  // Hub glow
  const hubGlowEl = svg.append('circle')
    .attr('cx', CX).attr('cy', CY)
    .attr('r', 38)
    .attr('fill', 'url(#hubGrad)')
    .attr('opacity', 0.8);

  // Hub dot
  svg.append('circle')
    .attr('cx', CX).attr('cy', CY)
    .attr('r', 5)
    .attr('fill', ACCENT);

  // Nodes
  const nodeEls = svg.append('g').selectAll('g')
    .data(wordNodes.filter(n => n.type !== 'hub'))
    .join('g')
    .attr('class', 'node');

  nodeEls.append('circle')
    .attr('class', 'node-ring')
    .attr('r', 20)
    .attr('fill', 'none')
    .attr('stroke', ACCENT)
    .attr('stroke-width', 1)
    .attr('opacity', 0);

  nodeEls.append('circle')
    .attr('class', 'node-dot')
    .attr('r', 5)
    .attr('fill', INK);

  // Labels — placed below the dot
  const textEls = nodeEls.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '22')
    .attr('font-size', '14')
    .attr('font-weight', '500')
    .attr('opacity', 0.85);

  textEls.each(function(d) {
    const t = d3.select(this);
    t.append('tspan').attr('fill', INK_L).text(d.pre);
    t.append('tspan').attr('fill', ACCENT).attr('font-weight', 600).text(d.suf);
  });

  // ── Flow particles ──
  const flowParticles = [];
  links.forEach(link => {
    for (let i = 0; i < 3; i++) {
      flowParticles.push({
        link,
        t: i / 3,
        speed: 0.002 + Math.random() * 0.002,
        r: 1.5 + Math.random()
      });
    }
  });

  const flowEls = flowG.selectAll('circle')
    .data(flowParticles)
    .join('circle')
    .attr('r', d => d.r)
    .attr('fill', MUTED);

  // ── Drag ──
  function dragStarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
  function dragEnded(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  }
  nodeEls.call(d3.drag().on('start', dragStarted).on('drag', dragged).on('end', dragEnded));

  // ── Tooltip ──
  const tooltip = document.getElementById('tooltip');

  nodeEls.on('mouseenter', function(event, d) {
    d3.select(this).select('.node-ring').attr('opacity', 0.6);
    d3.select(this).select('.node-dot').attr('fill', ACCENT).attr('r', 6);
    linkEls.filter(l => l.target.id === d.id)
      .attr('stroke', ACCENT).attr('stroke-width', 2).attr('opacity', 0.7);
    tooltip.textContent = d.id + ' \u2014 ' + d.zh;
    tooltip.classList.add('visible');
    const rect = this.getBoundingClientRect();
    tooltip.style.left = Math.max(8, rect.left + rect.width / 2 - tooltip.offsetWidth / 2) + 'px';
    tooltip.style.top = Math.max(8, rect.top - tooltip.offsetHeight - 14) + 'px';
  })
  .on('mouseleave', function(event, d) {
    d3.select(this).select('.node-ring').attr('opacity', 0);
    d3.select(this).select('.node-dot').attr('fill', INK).attr('r', 5);
    linkEls.filter(l => l.target.id === d.id)
      .attr('stroke', MUTED).attr('stroke-width', 1).attr('opacity', 0.35);
    tooltip.classList.remove('visible');
  })
  .on('click', function(event, d) {
    // Highlight all nodes in same family
    const fam = d.family;
    nodeEls.each(function(nd) {
      if (nd.family === fam) {
        d3.select(this).select('.node-ring').attr('opacity', 0.6);
        d3.select(this).select('.node-dot').attr('fill', ACCENT).attr('r', 6);
      } else {
        d3.select(this).select('.node-ring').attr('opacity', 0);
        d3.select(this).select('.node-dot').attr('fill', INK).attr('r', 5);
      }
    });
    linkEls.each(function(l) {
      const match = (l.target.family || l.source.family) === fam;
      d3.select(this)
        .attr('stroke', match ? ACCENT : MUTED)
        .attr('stroke-width', match ? 2 : 1)
        .attr('opacity', match ? 0.7 : 0.15);
    });
    // Show tooltip
    tooltip.textContent = d.id + ' \u2014 ' + d.zh;
    tooltip.classList.add('visible');
    const rect = this.getBoundingClientRect();
    tooltip.style.left = Math.max(8, rect.left + rect.width / 2 - tooltip.offsetWidth / 2) + 'px';
    tooltip.style.top = Math.max(8, rect.top - tooltip.offsetHeight - 14) + 'px';
    setTimeout(() => tooltip.classList.remove('visible'), 2000);
  });

  // Click background to reset
  svg.on('click', function(event) {
    if (event.target === this || event.target.tagName === 'svg') {
      nodeEls.select('.node-ring').attr('opacity', 0);
      nodeEls.select('.node-dot').attr('fill', INK).attr('r', 5);
      linkEls.attr('stroke', MUTED).attr('stroke-width', 1).attr('opacity', 0.35);
    }
  });

  // ── Tick ──
  simulation.on('tick', () => {
    wordNodes.forEach(n => {
      if (n.type !== 'hub') {
        n.x = Math.max(50, Math.min(W - 50, n.x));
        n.y = Math.max(30, Math.min(H - 30, n.y));
      }
    });
    linkEls
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeEls.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // ── Animation loop ──
  let frame = 0;
  function animate() {
    frame++;
    flowParticles.forEach(p => {
      p.t = (p.t + p.speed) % 1;
      const s = p.link.source, t = p.link.target;
      p.x = s.x + (t.x - s.x) * p.t;
      p.y = s.y + (t.y - s.y) * p.t;
    });
    flowEls
      .attr('cx', d => d.x).attr('cy', d => d.y)
      .attr('opacity', d => Math.sin(d.t * Math.PI) * 0.55);
    ambientEls
      .attr('cx', d => d.cx + Math.sin(frame * 0.008 + d.phase) * 3)
      .attr('cy', d => d.cy + Math.cos(frame * 0.006 + d.phase) * 2.5)
      .attr('opacity', d => d.baseOpacity + Math.sin(frame * 0.01 * d.speed + d.phase) * 0.06);
    const pulse = 1 + Math.sin(frame * 0.02) * 0.12;
    hubGlowEl.attr('r', 38 * pulse).attr('opacity', 0.8 + Math.sin(frame * 0.02) * 0.2);
    requestAnimationFrame(animate);
  }
  animate();

  // Signal ready for screenshot
  window.__constellationReady = true;
})();
</script>

</body>
</html>
